# ═══════════════════════════════════════════════════════════════
#  Amisafe Backend — render.yaml
#  Deploy everything with: render blueprint apply
#  Or connect this repo in the Render dashboard and it auto-reads.
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: amisafe-api
    runtime: node
    region: oregon          # closest to West Africa via CDN
    plan: free              # upgrade to starter ($7/mo) for always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Render injects DATABASE_URL automatically from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: amisafe-db
          property: connectionString

      # Set these manually in Render dashboard → Environment
      # (never commit real values to Git)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

      # Secret used to sign partner API keys — generate with:
      # node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: API_KEY_SECRET
        sync: false

      # Your deployed URL — used for CORS and docs links
      - key: PUBLIC_URL
        value: https://amisafe-api.onrender.com

databases:
  - name: amisafe-db
    databaseName: amisafe
    plan: free              # 1 GB, sufficient for pilot
    region: oregon
