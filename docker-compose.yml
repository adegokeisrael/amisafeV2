version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: amisafe_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: amisafe
      POSTGRES_PASSWORD: amisafe_dev
      POSTGRES_DB: amisafe
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: amisafe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: amisafe_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: ./api/.env
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: amisafe_dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: amisafe_bot
    restart: unless-stopped
    depends_on:
      - api
    env_file: ./bot/.env
    volumes:
      - bot_session:/app/.wwebjs_auth

volumes:
  pg_data:
  bot_session:
